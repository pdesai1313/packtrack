services:
  - type: web
    name: packtrack-api
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false   # Transaction pooler URL from Supabase Connect → ORMs → Prisma
      - key: DIRECT_URL
        sync: false   # Session pooler URL from Supabase Connect → ORMs → Prisma
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false   # your Vercel URL e.g. https://packtrack.vercel.app
      - key: APP_URL
        sync: false   # same as CORS_ORIGIN
      - key: RESEND_API_KEY
        sync: false   # optional — leave blank to log emails to console
      - key: EMAIL_FROM
        value: PackTrack <noreply@packtrack.app>
      - key: PORT
        value: 4000
